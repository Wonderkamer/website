name: Development Deploy

on:
  workflow_dispatch:

  push:
    branches: [develop]


concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          LOWERCASE_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          docker build -f docker/Dockerfile \
                       -t ghcr.io/${LOWERCASE_OWNER}/website:develop .
          docker push ghcr.io/${LOWERCASE_OWNER}/website:develop

  deploy:
    runs-on: ubuntu-latest

    needs: build

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H bb1.bushbaby.dev >> ~/.ssh/known_hosts
          # eval $(ssh-agent -s)
          # ssh-add ~/.ssh/id_ed25519

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Context
        run: |
          # Check if the context exists
          if ! docker context inspect bushbaby >/dev/null 2>&1; then
            docker context create bushbaby --docker "host=ssh://root@bb1.bushbaby.dev"
          fi
          docker context use bushbaby

      - name: Deploy to Docker Swarm
        env:
          APP_VERSION: 'develop'
          GOOGLE_RECAPTCHA_SECRET: ${{ secrets.GOOGLE_RECAPTCHA_SECRET }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          CONTACT_FORM_RECIPIENT: hallo@wonderkamer.com
        run: |
          docker stack deploy \
            --detach=true \
            --compose-file docker/docker-compose-development.yml \
            --with-registry-auth \
            wonderkamer-dev

      - name: Clean Up Private Key
        if: always()
        run: rm -f ~/.ssh/id_ed25519
