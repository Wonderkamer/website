packages:
  - apps/*
  - packages/*

overrides:
  # Ember 7 removed the legacy AMD ember-template-compiler bundle that
  # ember-cli-htmlbars < 6.1 references. Force the whole tree onto a version
  # that uses the modern compiler so unmaintained addons (ember-cli-head,
  # ember-g-recaptcha, ember-in-element-polyfill) keep building.
  ember-cli-htmlbars: '7.0.1'

allowBuilds:
  '@nestjs/core': true
  '@parcel/watcher': true
  bcrypt: true
  bufferutil: true
  core-js: true
  es5-ext: true
  msgpackr-extract: true
  nestjs-ember-static: true
  unrs-resolver: true
  utf-8-validate: true

minimumReleaseAgeExclude:
  - nestjs-ember-static@0.3.1

onlyBuiltDependencies:
  - '@nestjs/core'
  - '@parcel/watcher'
  - bcrypt
  - bufferutil
  - core-js
  - es5-ext
  - msgpackr-extract
  - nestjs-ember-static
  - utf-8-validate
