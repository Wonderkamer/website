version: '3.3'

networks:
  proxy-tier:
    external: true
  stack:
    external: false

services:
  www:
    image: ghcr.io/wonderkamer/website:${APP_VERSION}
    container_name: wonderkamer-development
    environment:
      APP_VERSION: '${APP_VERSION}'
      VIRTUAL_HOST: 'dev.wonderkamer.com'
      VIRTUAL_PORT: 80
      LETSENCRYPT_HOST: 'dev.wonderkamer.com'
      LETSENCRYPT_EMAIL: 'hallo@wonderkamer.com'
      GOOGLE_RECAPTCHA_SECRET: '${GOOGLE_RECAPTCHA_SECRET}'
      SMTP_PASSWORD: '${SMTP_PASSWORD}'
      CONTACT_FORM_RECIPIENT: '${CONTACT_FORM_RECIPIENT}'
    networks:
      - proxy-tier
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '0.50'
          memory: 20M
        reservations:
          cpus: '0.50'
          memory: 10M
