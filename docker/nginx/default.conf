server {
    listen 80;
    server_name www.wonderkamer.com;
    return 301 $scheme://wonderkamer.com$request_uri;
}

server {
    listen 80;
    server_name dev.wonderkamer.com;

    root /app;
    index index.php index.html index.htm;

    # Access and error logs
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Serve static files
    location / {
        try_files $uri $uri/ /index.html?$query_string;
    }

    # Handle PHP scripts
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # Deny access to .htaccess files
    location ~ /\.ht {
        deny all;
    }

    # Optional: limit client body size for file uploads
    client_max_body_size 10M;

    # Optional: cache control for static files
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|otf|eot|ttf|otf|webp)$ {
        expires max;
        log_not_found off;
    }
}
