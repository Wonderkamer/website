version: '3.3'

networks:
  proxy-tier:
    external: true

services:
  www:
    image: ghcr.io/wonderkamer/website:${SEMVER_TAG}
    container_name: wonderkamer-production
    environment:
      SEMVER_TAG: '${SEMVER_TAG}'
      VIRTUAL_HOST: 'wonderkamer.com,www.wonderkamer.com'
      VIRTUAL_PORT: 80
      LETSENCRYPT_HOST: 'wonderkamer.com,www.wonderkamer.com'
      LETSENCRYPT_EMAIL: 'hallo@wonderkamer.com'
      GOOGLE_RECAPTCHA_SECRET: '${GOOGLE_RECAPTCHA_SECRET}'
      SMTP_PASSWORD: '${SMTP_PASSWORD}'
      CONTACT_FORM_RECIPIENT: '${CONTACT_FORM_RECIPIENT}'
    networks:
      - proxy-tier
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '0.50'
          memory: 20M
        reservations:
          cpus: '0.50'
          memory: 10M
