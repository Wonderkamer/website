---
title: "Incoming contact request"
---

<x-main>
  <p class="text-2xl sm:leading-8 font-semibold m-0 mb-6">{{ page.title }}</p>

  <p>Hello there,</p>

  <p>
    We've received a contact request on
    <span class="text-primary no-underline">wonderkamer.com</span>
  </p>

  <div class="mt-6 border-t border-gray-100">
    <dl class="divide-y divide-gray-100">
      <div class="px-4 py-3 sm:grid sm:grid-cols-3 sm:gap-4 sm:px-0">
        <dt class="text-sm font-medium leading-6">Message</dt>
        <dd class="mt-1 text-sm leading-6 sm:col-span-2 sm:mt-0">
          @{{message}}
        </dd>
      </div>
      <div class="px-4 py-3 sm:grid sm:grid-cols-3 sm:gap-4 sm:px-0">
        <dt class="text-sm font-medium leading-6">From</dt>
        <dd class="mt-1 text-sm leading-6 sm:col-span-2 sm:mt-0">@{{name}}</dd>
      </div>
      <div class="px-4 py-3 sm:grid sm:grid-cols-3 sm:gap-4 sm:px-0">
        <dt class="text-sm font-medium leading-6">Email</dt>
        <dd
          class="mt-1 text-sm leading-6 sm:col-span-2 sm:mt-0 text-primary no-underline"
        >
          @{{email}}
        </dd>
      </div>
      <div class="px-4 py-3 sm:grid sm:grid-cols-3 sm:gap-4 sm:px-0">
        <dt class="text-sm font-medium leading-6">Phone</dt>
        <dd class="mt-1 text-sm leading-6 sm:col-span-2 sm:mt-0">@{{phone}}</dd>
      </div>
    </dl>
  </div>
</x-main>
