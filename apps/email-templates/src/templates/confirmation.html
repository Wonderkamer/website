---
title: "Confirming your email"
---

<extends src="src/layouts/main.html">
  <block name="template">
    <p>Hello @{{name}},</p>
    <p class="text-2xl sm:leading-8 font-semibold m-0 mb-6">{{ page.title }}</p>
    <p class="m-0 mb-6">
      Please verify your email address by clicking the button below:
    </p>
    <x-button href="@{{url}}">Confirm email address</x-button>
    <table class="w-full" role="separator">
      <tr>
        <td class="py-8">
          <div class="bg-slate-200 dark:bg-slate-800 h-px leading-px">
            &zwnj;
          </div>
        </td>
      </tr>
    </table>
    <p class="m-0 mb-4">
      If you didn't sign up for wonderkamer.com, you can safely ignore this
      email.
    </p>
  </block>
</extends>
