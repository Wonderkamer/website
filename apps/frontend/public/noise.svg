<svg viewBox='0 0 500 500' xmlns='http://www.w3.org/2000/svg'>
  <filter id='noiseFilter'>

    <feTurbulence
      type='fractalNoise'
      baseFrequency='1.59'
      numOctaves='2'
      stitchTiles='stitch'/>

    <feSpecularLighting
      result="specOut"
      specularExponent="20"
      lighting-color="#ffffff">
      <fePointLight x="50" y="75" z="200" />
    </feSpecularLighting>

    <feComposite
      in="SourceGraphic"
      in2="specOut"
      operator="arithmetic"
      k1="0"
      k2="1"
      k3="1"
      k4="0" />
  </filter>

  <rect width='100%' height='100%' filter='url(#noiseFilter)'/>
</svg>
